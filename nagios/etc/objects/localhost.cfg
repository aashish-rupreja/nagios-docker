define host {
    use             generic-host
    host_name       app-host
    address         host.docker.internal
    check_command   check-host-alive

    contact_groups  admins
}

define service {
    use                     generic-service
    host_name               app-host
    service_description     App HTTP (Port 3000)
    check_command           check_http_3000!host.docker.internal!3000!/

    check_interval          1
    retry_interval          1
    max_check_attempts      1
    check_period            24x7
    notification_period     24x7

    contact_groups          admins
}
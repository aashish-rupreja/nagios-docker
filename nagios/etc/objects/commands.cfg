define command {
    command_name    check_http_3000
    command_line    /usr/local/nagios/libexec/check_http -H $ARG1$ -p $ARG2$ -u $ARG3$
}

define command {
    command_name check-host-alive
    command_line /usr/local/nagios/libexec/check_tcp -H $HOSTADDRESS$ -p 3000
}

define command {
    command_name    notify-service-by-email
    command_line    /usr/bin/printf "Service Alert: $SERVICEDESC$ is $SERVICESTATE$" | /usr/bin/msmtp $CONTACTEMAIL$
}

define command {
    command_name    notify-host-by-email
    command_line    /usr/bin/printf "Host Alert: $HOSTNAME$ is $HOSTSTATE$" | /usr/bin/msmtp $CONTACTEMAIL$
}